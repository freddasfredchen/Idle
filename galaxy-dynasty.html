<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galaktisches Dynastieverwaltungssystem v0.1</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #070a12; color: #b8a98a; font-family: 'Share Tech Mono', monospace; font-size: 12px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
#header {
  background: linear-gradient(180deg, #0d1425 0%, #080c18 100%);
  border-bottom: 1px solid #1c2840;
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.title-main { font-family: 'Cinzel', serif; color: #c8aa4f; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; }
.title-sub { color: #2e4060; font-size: 9px; letter-spacing: 2px; margin-top: 2px; }
.dynasty-name { font-family: 'Cinzel', serif; color: #c8aa4f; font-size: 14px; font-weight: 600; text-align: right; }
.ruler-line { color: #506280; font-size: 10px; margin-top: 2px; text-align: right; }
#save-btn {
  background: none; border: 1px solid #1e2d45; color: #3a5070; cursor: pointer;
  font-family: 'Share Tech Mono', monospace; font-size: 9px; padding: 5px 12px;
  letter-spacing: 1px; transition: color 0.3s, border-color 0.3s; margin-left: 14px;
}
#save-btn.saved { color: #4ade80; border-color: #4ade80; }
#save-btn:hover { color: #c8aa4f; border-color: #c8aa4f; }

/* RESOURCE BAR */
#resource-bar {
  background: #08091480;
  border-bottom: 1px solid #141e30;
  padding: 6px 16px;
  display: flex;
  gap: 0;
  flex-shrink: 0;
  overflow-x: auto;
}
.res-item { display: flex; flex-direction: column; align-items: center; min-width: 76px; padding: 2px 6px; border-right: 1px solid #101825; }
.res-label { color: #2e3e55; font-size: 8px; letter-spacing: 1px; text-transform: uppercase; }
.res-value { font-size: 13px; font-weight: bold; line-height: 1.3; }
.res-rate { font-size: 9px; }

/* MAIN AREA */
#main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* PLANET PANEL */
#planet-panel {
  flex: 1;
  padding: 14px 16px;
  border-right: 1px solid #141e30;
  overflow-y: auto;
}
.panel-title {
  font-family: 'Cinzel', serif;
  color: #c8aa4f;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding-bottom: 8px;
  border-bottom: 1px solid #1a2840;
  margin-bottom: 12px;
}
.panel-title span { color: #2e4060; font-size: 9px; margin-left: 10px; font-family: 'Share Tech Mono', monospace; }
#building-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.bslot {
  aspect-ratio: 1;
  border: 1px solid #151f30;
  border-radius: 3px;
  background: #070a11;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 8px 4px;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.bslot.occupied { border-color: #243450; background: #0b1120; }
.bslot.occupied:hover { border-color: #3a5070; background: #0d1528; }
.bslot:not(.occupied):hover { border-color: #1e2d40; }
.bslot-sym { font-size: 20px; line-height: 1; }
.bslot-name { color: #445870; font-size: 8px; text-align: center; margin-top: 4px; line-height: 1.3; }
.bslot-level { position: absolute; top: 3px; right: 5px; color: #c8aa4f; font-size: 8px; }
.bslot-empty { color: #151e2d; font-size: 18px; }

/* SIDEBAR */
#sidebar {
  width: 270px;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
#tabs {
  display: flex;
  border-bottom: 1px solid #141e30;
  flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 8px 3px;
  background: none; border: none; border-bottom: 2px solid transparent;
  color: #253545; cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: 8px; letter-spacing: 1px; text-transform: uppercase;
  transition: color 0.2s;
}
.tab-btn.active { color: #c8aa4f; border-bottom-color: #c8aa4f; }
.tab-btn:hover:not(.active) { color: #5a7090; }
#tab-content { flex: 1; padding: 12px; overflow-y: auto; }

/* FACTION */
.faction-row { margin-bottom: 12px; }
.faction-header { display: flex; justify-content: space-between; margin-bottom: 3px; }
.faction-name { color: #607090; font-size: 9px; }
.faction-sat { font-size: 10px; font-weight: bold; }
.faction-bar-bg { height: 3px; background: #131c28; border-radius: 2px; overflow: hidden; }
.faction-bar-fill { height: 100%; transition: width 0.8s; border-radius: 2px; }
.faction-inf { color: #253545; font-size: 8px; margin-top: 2px; }

/* LOG */
#log-panel {
  border-top: 1px solid #141e30;
  height: 110px;
  overflow-y: auto;
  padding: 8px 16px;
  background: #05070f;
  flex-shrink: 0;
}
.log-title { color: #1a2840; font-size: 8px; letter-spacing: 2px; margin-bottom: 4px; }
.log-entry { font-size: 9px; line-height: 1.7; padding: 1px 0; border-bottom: 1px solid #0a0f1a; }
.log-entry.warn { color: #c87030; }
.log-entry.ok { color: #4a9060; }
.log-entry.info { color: #304560; }

/* STABILITY METER */
.stability-block { margin-top: 14px; padding-top: 10px; border-top: 1px solid #131c28; }
.stability-label { color: #2e4060; font-size: 8px; letter-spacing: 1px; margin-bottom: 4px; }
.stability-bar-bg { height: 4px; background: #131c28; border-radius: 2px; overflow: hidden; }
.stability-bar-fill { height: 100%; border-radius: 2px; transition: width 0.8s; }

/* TABS OTHER */
.empty-hint { color: #1e2d40; font-size: 9px; line-height: 1.8; }
.planet-card { border: 1px solid #1a2840; border-radius: 3px; padding: 8px 10px; margin-bottom: 8px; }
.planet-card-name { font-family: 'Cinzel', serif; color: #c8aa4f; font-size: 11px; }
.planet-card-sub { color: #354a60; font-size: 9px; margin-top: 3px; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div>
    <div class="title-main">Galaktisches Dynastieverwaltungssystem</div>
    <div class="title-sub" id="tick-display">PROTOKOLL 00000000 • VERSION 0.1.0-ALPHA</div>
  </div>
  <div style="display:flex; align-items:center;">
    <div>
      <div class="dynasty-name" id="dynasty-name">Haus von Steinberg</div>
      <div class="ruler-line" id="ruler-line">Albrecht I. • Generation I • Gierig, Paranoid</div>
    </div>
    <button id="save-btn" onclick="manualSave()">SPEICHERN</button>
  </div>
</div>

<!-- RESOURCE BAR -->
<div id="resource-bar"></div>

<!-- MAIN -->
<div id="main">

  <!-- PLANET PANEL -->
  <div id="planet-panel">
    <div class="panel-title" id="planet-title">
      Kepler Prime — Startkolonie
      <span id="slot-count">4/12 Bauplätze</span>
    </div>
    <div id="building-grid"></div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="tabs">
      <button class="tab-btn active" onclick="switchTab('factions', this)">Fakt.</button>
      <button class="tab-btn" onclick="switchTab('research', this)">Forsch.</button>
      <button class="tab-btn" onclick="switchTab('decrees', this)">Erlasse</button>
      <button class="tab-btn" onclick="switchTab('planets', this)">Planeten</button>
    </div>
    <div id="tab-content"></div>
  </div>
</div>

<!-- LOG -->
<div id="log-panel">
  <div class="log-title">REICHSCHRONIK</div>
  <div id="log-entries"></div>
</div>

<script>
const SAVE_KEY = 'gds_v1';
const TICK_MS = 1000;
const MAX_OFFLINE_DECAY_S = 21600; // 6h cap
const LOYALTY_FLOOR = 15;
let currentTab = 'factions';

// ── INITIAL STATE ────────────────────────────────────────────
function createInitialState() {
  return {
    meta: { lastSaved: Date.now(), gameTick: 0 },
    dynasty: {
      name: "Haus von Steinberg",
      ruler: { name: "Albrecht I.", traits: ["Gierig", "Paranoid"], age: 48 },
      generation: 1,
    },
    resources: {
      energy:    { v: 150,  cap: 1000, rate: 3.5,   decay: 0,       label: "Energie",    sym: "⚡", col: "#fbbf24" },
      minerals:  { v: 80,   cap: 500,  rate: 1.2,   decay: 0,       label: "Mineralien", sym: "⬡", col: "#94a3b8" },
      food:      { v: 200,  cap: 800,  rate: 2.1,   decay: 0,       label: "Nahrung",    sym: "◇", col: "#86efac" },
      credits:   { v: 500,  cap: 9999, rate: 0.8,   decay: 0,       label: "Credits",    sym: "₡", col: "#c8aa4f" },
      research:  { v: 20,   cap: 300,  rate: 0.3,   decay: 0,       label: "Forschung",  sym: "⬢", col: "#7dd3fc" },
      influence: { v: 45,   cap: 200,  rate: 0.15,  decay: -0.03,   label: "Einfluss",   sym: "◈", col: "#e879f9" },
      loyalty:   { v: 72,   cap: 100,  rate: 0,     decay: -0.005,  label: "Loyalität",  sym: "♥", col: "#f87171" },
    },
    planet: {
      name: "Kepler Prime", type: "Startkolonie", slots: 12,
      buildings: [
        { id: 1, type: "solar",    name: "Solaranlage Mk.II",       level: 2, slot: 0 },
        { id: 2, type: "mine",     name: "Asteroidenmine",           level: 1, slot: 1 },
        { id: 3, type: "farm",     name: "Hydroponie-Komplex",       level: 1, slot: 2 },
        { id: 4, type: "ministry", name: "Min. f. Wahrh. u. Verw.", level: 1, slot: 3 },
      ],
    },
    factions: [
      { id: "corp",    name: "Patriot. Unternehmerfront",  sat: 62, inf: 28, col: "#fbbf24" },
      { id: "science", name: "Aufgekl. Expansionisten",    sat: 48, inf: 24, col: "#60a5fa" },
      { id: "workers", name: "Arbeiterkollektiv Ω-7",      sat: 31, inf: 22, col: "#f87171" },
      { id: "order",   name: "Orden d. Kosm. Wahrheit",    sat: 71, inf: 26, col: "#a78bfa" },
    ],
    log: [
      { id: 1, sev: "ok",   msg: "Kepler Prime kolonisiert. Protokoll 7-B initiiert." },
      { id: 2, sev: "warn", msg: "Arbeiterkollektiv Ω-7: 'spontane Erholungsaktivitäten' in Sektor 3 gemeldet." },
      { id: 3, sev: "info", msg: "Min. f. Wahrheit u. Verwandtes aufgenommen. Produktivität: statistisch vernachlässigbar gestiegen." },
      { id: 4, sev: "warn", msg: "Loyalitätswerte sinken. Erlass 4-C ('Optimierte Freizeitgestaltung') empfohlen." },
    ],
  };
}

// ── OFFLINE CALC ──────────────────────────────────────────────
function applyOffline(state) {
  const now = Date.now();
  const elapsed = (now - state.meta.lastSaved) / 1000;
  if (elapsed < 2) return { ...state, meta: { ...state.meta, lastSaved: now } };

  const decayElapsed = Math.min(elapsed, MAX_OFFLINE_DECAY_S);
  const newRes = {};
  for (const [k, r] of Object.entries(state.resources)) {
    let v = r.v + r.rate * elapsed + r.decay * decayElapsed;
    if (k === 'loyalty') v = Math.max(LOYALTY_FLOOR, v);
    v = Math.max(0, Math.min(r.cap, v));
    newRes[k] = { ...r, v };
  }

  const mins = Math.round(elapsed / 60);
  const newLog = [
    { id: now, sev: "info", msg: `Offline-Protokoll: ${mins > 60 ? Math.round(mins/60)+'h' : mins+'min'} Abwesenheit kompensiert. Das Reich ist, wider Erwarten, noch existent.` },
    ...state.log
  ].slice(0, 25);

  return { ...state, resources: newRes, log: newLog, meta: { ...state.meta, lastSaved: now } };
}

// ── STATE ─────────────────────────────────────────────────────
let GS = null;

function loadState() {
  try {
    const saved = localStorage.getItem(SAVE_KEY);
    GS = saved ? applyOffline(JSON.parse(saved)) : createInitialState();
  } catch {
    GS = createInitialState();
  }
  renderAll();
}

// ── TICK ──────────────────────────────────────────────────────
function tickState() {
  if (!GS) return;
  const dt = TICK_MS / 1000;
  for (const [k, r] of Object.entries(GS.resources)) {
    let v = r.v + (r.rate + r.decay) * dt;
    if (k === 'loyalty') v = Math.max(LOYALTY_FLOOR, v);
    v = Math.max(0, Math.min(r.cap, v));
    GS.resources[k].v = v;
  }
  GS.meta.gameTick++;
  renderResources();
  renderTick();
  if (GS.meta.gameTick % 30 === 0) autoSave();
}
setInterval(tickState, TICK_MS);

// ── SAVE ──────────────────────────────────────────────────────
function autoSave() {
  if (!GS) return;
  try {
    GS.meta.lastSaved = Date.now();
    localStorage.setItem(SAVE_KEY, JSON.stringify(GS));
  } catch {}
}

function manualSave() {
  if (!GS) return;
  GS.meta.lastSaved = Date.now();
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(GS));
    const btn = document.getElementById('save-btn');
    btn.textContent = '✓ GESPEICHERT';
    btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'SPEICHERN'; btn.classList.remove('saved'); }, 2000);
  } catch {}
}

// ── FORMAT ────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1e6) return (n/1e6).toFixed(1)+'M';
  if (n >= 1e3) return (n/1e3).toFixed(1)+'K';
  return Math.floor(n).toString();
}
function fmtRate(r) {
  const t = r.rate + r.decay;
  return (t >= 0 ? '+' : '') + t.toFixed(2) + '/s';
}
function satColor(v) {
  if (v >= 70) return '#4ade80';
  if (v >= 50) return '#fbbf24';
  if (v >= 30) return '#fb923c';
  return '#f87171';
}

// ── BUILDING META ─────────────────────────────────────────────
const BLDG = {
  solar:    { sym: "◉", col: "#fbbf24" },
  mine:     { sym: "⬡", col: "#94a3b8" },
  farm:     { sym: "◇", col: "#86efac" },
  ministry: { sym: "◆", col: "#c084fc" },
  lab:      { sym: "⬢", col: "#7dd3fc" },
  barracks: { sym: "▲", col: "#f87171" },
  shipyard: { sym: "◈", col: "#e879f9" },
};

// ── RENDER ────────────────────────────────────────────────────
function renderAll() {
  if (!GS) return;
  renderHeader();
  renderResources();
  renderPlanet();
  renderLog();
  renderTab();
  renderTick();
}

function renderHeader() {
  document.getElementById('dynasty-name').textContent = GS.dynasty.name;
  document.getElementById('ruler-line').textContent =
    `${GS.dynasty.ruler.name} • Generation ${toRoman(GS.dynasty.generation)} • ${GS.dynasty.ruler.traits.join(', ')}`;
}

function renderTick() {
  document.getElementById('tick-display').textContent =
    `PROTOKOLL ${GS.meta.gameTick.toString().padStart(8,'0')} • VERSION 0.1.0-ALPHA`;
}

function renderResources() {
  const bar = document.getElementById('resource-bar');
  bar.innerHTML = Object.entries(GS.resources).map(([k, r]) => {
    const netRate = r.rate + r.decay;
    const rateCol = netRate > 0 ? '#4a7a50' : netRate < 0 ? '#8a3535' : '#2e3e55';
    const isFull = r.v >= r.cap * 0.98;
    const valCol = isFull ? '#fb923c' : r.col;
    return `<div class="res-item">
      <div class="res-label">${r.label}</div>
      <div class="res-value" style="color:${valCol}">${r.sym} ${fmt(r.v)}</div>
      <div class="res-rate" style="color:${rateCol}">${fmtRate(r)}</div>
    </div>`;
  }).join('');
}

function renderPlanet() {
  const p = GS.planet;
  document.getElementById('planet-title').innerHTML =
    `<span style="font-family:'Cinzel',serif">${p.name}</span> — ${p.type} <span>${p.buildings.length}/${p.slots} Bauplätze</span>`;

  const slotMap = {};
  p.buildings.forEach(b => slotMap[b.slot] = b);
  const grid = document.getElementById('building-grid');
  grid.innerHTML = Array.from({length: p.slots}, (_, i) => {
    const b = slotMap[i];
    if (b) {
      const m = BLDG[b.type] || {sym:'?', col:'#fff'};
      return `<div class="bslot occupied" title="${b.name} (Stufe ${b.level})">
        <div class="bslot-level">Lv${b.level}</div>
        <div class="bslot-sym" style="color:${m.col}">${m.sym}</div>
        <div class="bslot-name">${b.name}</div>
      </div>`;
    }
    return `<div class="bslot" title="Leerer Bauplatz">
      <div class="bslot-empty">+</div>
    </div>`;
  }).join('');
}

function renderLog() {
  const el = document.getElementById('log-entries');
  el.innerHTML = GS.log.map(e =>
    `<div class="log-entry ${e.sev}">${e.sev==='warn'?'⚠ ':e.sev==='ok'?'✓ ':'› '}${e.msg}</div>`
  ).join('');
}

function renderTab() {
  const el = document.getElementById('tab-content');
  if (currentTab === 'factions') {
    const stability = Math.round(GS.factions.reduce((a,f) => a + f.sat * f.inf/100, 0));
    const stabCol = satColor(stability);
    el.innerHTML = `
      <div class="panel-title">Fraktionsstatus</div>
      ${GS.factions.map(f => `
        <div class="faction-row">
          <div class="faction-header">
            <span class="faction-name">${f.name}</span>
            <span class="faction-sat" style="color:${satColor(f.sat)}">${Math.round(f.sat)}%</span>
          </div>
          <div class="faction-bar-bg">
            <div class="faction-bar-fill" style="width:${f.sat}%;background:${satColor(f.sat)}"></div>
          </div>
          <div class="faction-inf">Einfluss: ${f.inf}%</div>
        </div>
      `).join('')}
      <div class="stability-block">
        <div class="stability-label">GESAMTSTABILITÄT</div>
        <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:9px;color:${stabCol}">${stability}%</span>
        </div>
        <div class="stability-bar-bg">
          <div class="stability-bar-fill" style="width:${stability}%;background:${stabCol}"></div>
        </div>
      </div>`;
  } else if (currentTab === 'research') {
    el.innerHTML = `
      <div class="panel-title">Forschungsbaum</div>
      <p class="empty-hint">Forschungszentrum nicht errichtet.<br><br>Errichte ein Forschungszentrum auf Kepler Prime um Technologien zu erforschen.</p>`;
  } else if (currentTab === 'decrees') {
    el.innerHTML = `
      <div class="panel-title">Aktive Erlasse</div>
      <p class="empty-hint">Keine aktiven Erlasse.<br><br>Erlasse kosten Einfluss und haben dauerhafte Konsequenzen für Fraktionen und Ressourcen.</p>
      <div style="margin-top:12px;padding:8px;border:1px solid #1a2030;border-radius:2px;">
        <div style="color:#c8aa4f;font-size:9px;font-family:'Cinzel',serif;margin-bottom:4px;">Beispiel</div>
        <div style="color:#354a60;font-size:9px;line-height:1.6;">Erlass 4-C: "Optimierte Freizeitgestaltung"<br>— +15% Produktion<br>— Arbeiterkollektiv Ω-7: -20 Zufriedenheit<br>— Kosten: 30 Einfluss</div>
      </div>`;
  } else if (currentTab === 'planets') {
    el.innerHTML = `
      <div class="panel-title">Planeten</div>
      <div class="planet-card">
        <div class="planet-card-name">${GS.planet.name}</div>
        <div class="planet-card-sub">${GS.planet.type} • ${GS.planet.slots} Bauplätze</div>
      </div>
      <p class="empty-hint" style="margin-top:8px;">Weitere Planeten durch Kolonisierung erschließbar.<br><br>Benötigt: Raumwerft + Kolonisierungsschiff + 100 Einfluss.</p>`;
  }
}

function switchTab(tab, btn) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTab();
}

function toRoman(n) {
  const r = ['I','II','III','IV','V','VI','VII','VIII','IX','X'];
  return r[n-1] || n;
}

// ── INIT ──────────────────────────────────────────────────────
loadState();
</script>
</body>
</html>
